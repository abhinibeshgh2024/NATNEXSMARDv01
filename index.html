<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMARD | Abhinibesh Gupta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --border-white: rgba(255, 255, 255, 0.15);
            /* Brand Colors */
            --whatsapp: #25D366;
            --linkedin: #0077b5;
            --instagram: #E1306C;
            --website: #00d2ff;
            --phone: #4CAF50;
            --mail: #EA4335;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .card-container {
            width: 95%;
            max-width: 400px;
            padding: 40px 10px;
            text-align: center;
        }

        .profile-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-white);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid var(--neon-blue);
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }

        h1 { font-size: 1.6rem; margin-bottom: 5px; letter-spacing: 1px; }
        .tagline { font-size: 0.85rem; color: #888; margin-bottom: 25px; }

        /* Icon Grid Styling */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .icon-box {
            background: var(--glass-bg);
            border: 1px solid var(--border-white);
            padding: 18px;
            border-radius: 20px;
            color: #fff; /* Initial state white */
            text-decoration: none;
            transition: all 0.4s ease;
            font-size: 1.3rem;
        }

        /* Hover Individual Colors for Grid */
        .icon-box:hover { background: rgba(255,255,255,0.12); transform: translateY(-3px); }
        #phoneBtn:hover i { color: var(--phone); text-shadow: 0 0 10px var(--phone); }
        #waBtn:hover i { color: var(--whatsapp); text-shadow: 0 0 10px var(--whatsapp); }
        #mailBtn:hover i { color: var(--mail); text-shadow: 0 0 10px var(--mail); }

        /* Full Width List Buttons */
        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            background: var(--glass-bg);
            border: 1px solid var(--border-white);
            padding: 16px;
            border-radius: 18px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        .btn i { 
            color: #fff; /* Initial state white */
            width: 25px; 
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        /* Hover States for List Buttons */
        .btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.3);
            transform: translateX(5px);
        }

        /* Specific Hover Icon Colors */
        .btn:hover#saveContact i { color: var(--neon-blue); }
        .btn:hover[href*="linkedin"] i { color: var(--linkedin); }
        .btn:hover[href*="instagram"] i { color: var(--instagram); }
        .btn:hover[href*="gogenix"] i { color: var(--website); }

        /* Pay Button Styling */
        .pay-btn {
            background: linear-gradient(90deg, #6a11cb 0%, #2575fc 100%);
            border: none !important;
            margin-top: 10px;
            justify-content: center;
        }
        .pay-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(37, 117, 252, 0.4);
        }
        .pay-btn i { margin-right: 10px; }

        footer { margin-top: 35px; font-size: 0.7rem; color: #555; letter-spacing: 4px; font-weight: bold; }

        /* Laptop QR Modal (Previously discussed) */
        #qrModal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center; flex-direction:column;
        }
    </style>
</head>
<body>

<div class="card-container">
    <div class="profile-card">
        <img src="abhimage.jpg" alt="Abhinibesh" class="avatar">
        <h1>Abhinibesh Gupta</h1>
        <p class="tagline">Founder & CEO, NatNex Technologies</p>

        <div class="action-grid">
            <a id="phoneBtn" href="#" class="icon-box"><i class="fas fa-phone"></i></a>
            <a id="waBtn" href="#" class="icon-box"><i class="fab fa-whatsapp"></i></a>
            <a id="mailBtn" href="#" class="icon-box"><i class="fas fa-envelope"></i></a>
        </div>

        <div class="btn-list">
            <a href="#" class="btn" id="saveContact"><i class="fas fa-user-plus"></i> Save Contact</a>
            <a href="https://in.linkedin.com/in/abhinibesh-gupta-758596265" target="_blank" class="btn"><i class="fab fa-linkedin"></i> LinkedIn</a>
            <a href="https://instagram.com/abhinibeshgupta/" target="_blank" class="btn"><i class="fab fa-instagram"></i> Instagram</a>
            <a href="https://gogenixwebb.xyz" target="_blank" class="btn"><i class="fas fa-globe"></i> Website</a>
            <a id="upiBtn" href="javascript:void(0)" class="btn pay-btn"><i class="fas fa-bolt"></i> Pay via UPI</a>
        </div>
    </div>
    <div class="todo-panel">
    <div class="todo-header">
        <div id="currentDate"></div>
        <button id="addTaskBtn"><i class="fas fa-plus"></i></button>
    </div>
    <div class="todo-list" id="todoContainer">
        </div>
</div>

<style>
    .todo-panel {
        margin-top: 20px;
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        border: 1px solid var(--border-white);
        border-radius: 25px;
        padding: 20px;
        text-align: left;
    }

    .todo-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 10px;
    }

    #currentDate {
        font-weight: bold;
        color: var(--neon-blue);
        font-size: 0.9rem;
    }

    #addTaskBtn {
        background: var(--neon-blue);
        border: none;
        color: #000;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .todo-list {
        max-height: 200px;
        overflow-y: auto;
    }

    .todo-item {
        background: rgba(255,255,255,0.05);
        margin-bottom: 8px;
        padding: 10px 15px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 0.85rem;
        animation: slideIn 0.3s ease;
    }

    .todo-item.completed {
        opacity: 0.5;
        text-decoration: line-through;
    }

    .todo-item i {
        cursor: pointer;
        color: #ff4d4d;
    }

    @keyframes slideIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
    <footer>NATNEX • SMARD</footer>
</div>

<div id="qrModal">
    <div style="background:white; padding:25px; border-radius:25px; text-align:center;">
        <p style="color:black; font-weight:bold; margin-bottom:15px; font-family:sans-serif;">Scan with Any UPI App</p>
        <img src="qrwalet.png" alt="UPI QR" style="width:200px; height:200px;">
        <br>
        <button onclick="document.getElementById('qrModal').style.display='none'" style="margin-top:15px; padding:12px 25px; border-radius:12px; border:none; background:#000; color:white; font-weight:bold; cursor:pointer;">Close</button>
    </div>
</div>

<script src="config.js"></script>
</body>
</html>
