<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMARD | Abhinibesh Gupta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-blue: #4285f4; --neon-red: #ea4335; --neon-yellow: #fbbc05; --neon-green: #34a853;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --border-white: rgba(255, 255, 255, 0.15);
        }

        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }

        body {
            margin: 0; background: radial-gradient(circle at center, #101010 0%, #000 100%);
            color: #fff; font-family: 'Inter', sans-serif; display: flex;
            flex-direction: column; align-items: center; min-height: 100vh; padding: 20px 0;
            scroll-behavior: smooth;
        }

        .card-container { width: 95%; max-width: 420px; text-align: center; }

        /* Profile Card */
        .profile-card {
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--border-white); border-radius: 30px;
            padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.8); margin-bottom: 25px;
        }

        .avatar {
            width: 110px; height: 110px; border-radius: 50%;
            border: 3px solid var(--neon-blue); margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(66, 133, 244, 0.5);
        }

        h1 { font-size: 1.6rem; margin: 0 0 5px; color: #fff; }
        .tagline { font-size: 0.85rem; color: #aaa; margin-bottom: 25px; }

        .btn-list { display: flex; flex-direction: column; gap: 12px; }
        .btn {
            background: var(--glass-bg); border: 1px solid var(--border-white);
            padding: 16px; border-radius: 18px; color: white;
            text-decoration: none; display: flex; align-items: center; gap: 15px;
            font-weight: 600; transition: 0.3s; cursor: pointer;
        }
        .btn-blue { border-left: 4px solid var(--neon-blue); }
        .btn-red { border-left: 4px solid var(--neon-red); }
        .btn-yellow { border-left: 4px solid var(--neon-yellow); }
        
        .apt-btn { 
            background: linear-gradient(90deg, var(--neon-blue), #1a73e8); 
            border: none; justify-content: center; box-shadow: 0 0 15px rgba(66, 133, 244, 0.4);
        }

        /* MODAL STYLES */
        .modal-overlay {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.9); z-index:2000; justify-content:center; align-items:center;
            backdrop-filter: blur(10px);
        }
        .modal-content {
            background: #111; padding: 25px; border-radius: 25px; 
            border: 1px solid var(--border-white); width: 90%; max-width: 380px;
        }
        .modal-content h3 { margin-top:0; color:var(--neon-blue); font-size: 1.2rem; }
        .modal-content input, .modal-content textarea {
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px;
            border: 1px solid var(--border-white); background: rgba(255,255,255,0.05); color: white;
        }
        .save-btn { background: var(--neon-blue); color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }

        /* SAKA CALENDAR */
        .saka-panel {
            background: var(--glass-bg); border-radius: 30px; padding: 20px;
            margin-top: 20px; border: 1px solid var(--border-white);
        }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 15px; }
        .day-cell {
            background: rgba(255,255,255,0.03); border-radius: 10px; padding: 8px 0;
            min-height: 60px; cursor: pointer; transition: 0.2s;
        }
        .day-cell.active { border: 1px solid var(--neon-green); background: rgba(52, 168, 83, 0.1); }

        /* PLANNER SECTION */
        .planner-box {
            background: #000; border: 1px solid var(--border-white); border-radius: 25px;
            margin-top: 20px; padding: 20px; display: none; text-align: left;
            border-top: 4px solid var(--neon-blue);
        }
    </style>
</head>
<body>

<div class="card-container">
    <div class="profile-card">
        <img src="abhimage.jpg" alt="Abhinibesh" class="avatar">
        <h1>Abhinibesh Gupta</h1>
        <p class="tagline">Founder & CEO, NatNex Technologies</p>

        <div class="btn-list">
            <a href="https://in.linkedin.com/in/abhinibesh-gupta-758596265" target="_blank" class="btn btn-blue"><i class="fab fa-linkedin"></i> LinkedIn</a>
            <a href="https://gogenixwebb.xyz" target="_blank" class="btn btn-yellow"><i class="fas fa-globe"></i> Website</a>
            <div class="btn apt-btn" onclick="openAptModal()"><i class="fas fa-calendar-check"></i> BOOK APPOINTMENT</div>
        </div>
    </div>

    <div class="saka-panel">
        <div style="display:flex; justify-content: space-between; align-items:center;">
            <button onclick="navMonth(-1)" style="background:none; border:none; color:white; cursor:pointer;">❮</button>
            <h2 id="mTitle" style="color:var(--neon-yellow); font-size: 1rem; margin:0;">CHAITRA</h2>
            <button onclick="navMonth(1)" style="background:none; border:none; color:white; cursor:pointer;">❯</button>
        </div>
        <div class="calendar-grid" id="calGrid"></div>
    </div>

    <div class="planner-box" id="planner">
        <h3 id="pSakaDate" style="color:var(--neon-yellow); margin-bottom:10px;">Date</h3>
        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <input type="text" id="taskInput" placeholder="Add private note..." style="flex:1; background:#111; border:1px solid #333; color:white; padding:10px; border-radius:10px;">
            <button onclick="saveEvent()" style="background:var(--neon-green); border:none; padding:10px; border-radius:10px; font-weight:bold; cursor:pointer;">ADD</button>
        </div>
        <div id="taskList"></div>
    </div>

    <footer style="margin-top:40px; color:#444; font-size:0.7rem; letter-spacing:3px;">NATNEX • SMARD</footer>
</div>

<div id="aptModal" class="modal-overlay">
    <div class="modal-content">
        <h3>Book Appointment</h3>
        <input type="text" id="aptName" placeholder="Your Name">
        <input type="text" id="aptTitle" placeholder="Meeting Title">
        <div style="display:flex; gap:5px;">
            <input type="date" id="aptDate">
            <input type="time" id="aptTime">
        </div>
        <textarea id="aptDesc" rows="3" placeholder="Purpose..."></textarea>
        <div style="display:flex; gap:10px;">
            <button class="save-btn" style="background:#444; color:white;" onclick="closeAptModal()">Cancel</button>
            <button class="save-btn" onclick="sendAptEmail()">OK</button>
        </div>
    </div>
</div>

<script>
    // Appointment Functions
    function openAptModal() { document.getElementById('aptModal').style.display = 'flex'; }
    function closeAptModal() { document.getElementById('aptModal').style.display = 'none'; }
    function sendAptEmail() {
        const name = document.getElementById('aptName').value;
        const title = document.getElementById('aptTitle').value;
        const date = document.getElementById('aptDate').value;
        const time = document.getElementById('aptTime').value;
        const body = `Meeting with ${name}%0AEvent: ${title}%0ADate: ${date}%0ATime: ${time}`;
        window.location.href = `mailto:contact@gogenixwebb.xyz?subject=New Appointment&body=${body}`;
        closeAptModal();
    }

    // Calendar Engine
    let sIdx = 0; let sYear = 2026; let selectedId = null;
    const months = [
        { name: "Chaitra", days: 30, gStart: "03-22" }, { name: "Vaishakha", days: 31, gStart: "04-21" },
        { name: "Jyeshtha", days: 31, gStart: "05-22" }, { name: "Ashadha", days: 31, gStart: "06-22" },
        { name: "Shravana", days: 31, gStart: "07-23" }, { name: "Bhadrapada", days: 31, gStart: "08-23" },
        { name: "Ashwina", days: 30, gStart: "09-23" }, { name: "Kartika", days: 30, gStart: "10-23" },
        { name: "Agrahayana", days: 30, gStart: "11-22" }, { name: "Pausha", days: 30, gStart: "12-22" },
        { name: "Magha", days: 30, gStart: "01-21" }, { name: "Phalguna", days: 30, gStart: "02-20" }
    ];
    let myTasks = JSON.parse(localStorage.getItem('smard_tasks')) || {};

    function render() {
        const grid = document.getElementById('calGrid');
        const m = months[sIdx];
        document.getElementById('mTitle').innerText = m.name.toUpperCase();
        grid.innerHTML = '';
        
        const startG = new Date(sYear, parseInt(m.gStart.split('-')[0])-1, parseInt(m.gStart.split('-')[1]));
        for(let i=0; i<startG.getDay(); i++) grid.appendChild(document.createElement('div'));

        for(let d=1; d<=m.days; d++) {
            const gDate = new Date(startG); gDate.setDate(gDate.getDate() + (d-1));
            const id = `${sYear}-${sIdx}-${d}`;
            const cell = document.createElement('div');
            cell.className = `day-cell ${selectedId === id ? 'active' : ''}`;
            cell.innerHTML = `<div style="font-weight:900;">${d}</div><div style="font-size:0.5rem; color:#666;">${gDate.getDate()}</div>`;
            cell.onclick = () => {
                selectedId = id;
                document.getElementById('planner').style.display = 'block';
                document.getElementById('pSakaDate').innerText = `${m.name} ${d}`;
                render(); loadTasks();
                document.getElementById('planner').scrollIntoView({ behavior: 'smooth' });
            };
            grid.appendChild(cell);
        }
    }

    function saveEvent() {
        const val = document.getElementById('taskInput').value.trim();
        if(!val) return;
        if(!myTasks[selectedId]) myTasks[selectedId] = [];
        myTasks[selectedId].push(val);
        localStorage.setItem('smard_tasks', JSON.stringify(myTasks));
        document.getElementById('taskInput').value = '';
        loadTasks();
    }

    function loadTasks() {
        const list = document.getElementById('taskList');
        list.innerHTML = '';
        if(selectedId && selectedId.endsWith('-0-1')) {
            list.innerHTML += `<div style="padding:10px; background:#111; border-radius:8px; margin-bottom:5px; border-left:3px solid var(--neon-red);">🚩 Abhinibesh Birthday</div>`;
        }
        (myTasks[selectedId] || []).forEach(t => {
            list.innerHTML += `<div style="padding:10px; background:#111; border-radius:8px; margin-bottom:5px; border-left:3px solid var(--neon-green);">${t}</div>`;
        });
    }

    function navMonth(dir) { sIdx += dir; if(sIdx > 11) { sIdx = 0; sYear++; } if(sIdx < 0) { sIdx = 11; sYear--; } render(); }
    render();
</script>
</body>
</html>
