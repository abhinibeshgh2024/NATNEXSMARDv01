<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMARD | Abhinibesh Gupta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --border-white: rgba(255, 255, 255, 0.15);
            --whatsapp: #25D366; --linkedin: #0077b5; --instagram: #E1306C;
            --website: #00d2ff; --phone: #4CAF50; --mail: #EA4335;
        }

        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }

        body {
            margin: 0; background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%);
            color: #fff; font-family: 'Inter', sans-serif; display: flex;
            justify-content: center; min-height: 100vh; padding: 20px 0;
        }

        .card-container { width: 95%; max-width: 400px; text-align: center; }

        .profile-card {
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--border-white); border-radius: 30px;
            padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); margin-bottom: 20px;
        }

        .avatar {
            width: 110px; height: 110px; border-radius: 50%;
            border: 3px solid var(--neon-blue); margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }

        h1 { font-size: 1.6rem; margin: 0 0 5px; }
        .tagline { font-size: 0.85rem; color: #888; margin-bottom: 25px; }

        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .icon-box {
            background: var(--glass-bg); border: 1px solid var(--border-white);
            padding: 18px; border-radius: 20px; color: #fff; text-decoration: none;
            transition: all 0.4s ease; font-size: 1.3rem;
        }
        .icon-box:hover { background: rgba(255,255,255,0.12); transform: translateY(-3px); }

        .btn-list { display: flex; flex-direction: column; gap: 12px; }
        .btn {
            background: var(--glass-bg); border: 1px solid var(--border-white);
            padding: 16px; border-radius: 18px; color: white;
            text-decoration: none; display: flex; align-items: center; gap: 15px;
            font-weight: 500; transition: all 0.3s ease; cursor: pointer;
        }
        .btn i { width: 25px; font-size: 1.2rem; }
        .btn:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }

        /* Appointment Button Styling */
        .apt-btn { background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%); border: none !important; justify-content: center; }

        /* TO-DO PANEL */
        .todo-panel {
            background: var(--glass-bg); backdrop-filter: blur(25px);
            border: 1px solid var(--border-white); border-radius: 30px; padding: 25px; margin-top: 20px;
        }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .calendar-nav { display: flex; align-items: center; gap: 10px; }
        .calendar-nav h2 { font-size: 0.9rem; color: var(--neon-blue); margin: 0; text-transform: uppercase; width: 120px; }
        
        .nav-btn, .add-task-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border-white);
            color: white; padding: 8px 12px; border-radius: 10px; cursor: pointer;
        }
        .add-task-btn { background: var(--neon-blue); color: #000; font-weight: bold; border: none; }

        .event-item {
            background: rgba(255, 255, 255, 0.03); padding: 15px; border-radius: 18px;
            margin-bottom: 12px; display: flex; align-items: center; gap: 12px;
        }
        .event-content { flex: 1; text-align: left; }
        .event-title { font-weight: bold; color: var(--neon-blue); }
        .event-date { font-size: 0.7rem; color: #666; margin-top: 4px; }
        .delete-btn { color: #ff4d4d; background: none; border: none; cursor: pointer; }

        /* Modals (Shared Styles) */
        .modal-overlay {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.9); z-index:2000; justify-content:center; align-items:center;
            backdrop-filter: blur(10px);
        }
        .modal-content {
            background: #1a1a2e; padding: 25px; border-radius: 25px; 
            border: 1px solid var(--border-white); width: 90%; max-width: 380px;
        }
        .modal-content h3 { margin-top:0; color:var(--neon-blue); font-size: 1.2rem; }
        .modal-content input, .modal-content textarea {
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px;
            border: 1px solid var(--border-white); background: rgba(255,255,255,0.05); color: white;
            font-family: inherit;
        }
        .modal-actions { display: flex; gap: 10px; margin-top: 15px; }
        .save-btn { flex: 1; background: var(--neon-blue); color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .cancel-btn { flex: 1; background: rgba(255,255,255,0.1); color: #fff; border: none; padding: 12px; border-radius: 10px; cursor: pointer; }

        footer { margin-top: 30px; font-size: 0.7rem; color: #444; letter-spacing: 4px; }
    </style>
</head>
<body>

<div class="card-container">
    <div class="profile-card">
        <img src="abhimage.jpg" alt="Abhinibesh" class="avatar">
        <h1>Abhinibesh Gupta</h1>
        <p class="tagline">Founder & CEO, NatNex Technologies</p>

        <div class="action-grid">
            <a id="phoneBtn" href="#" class="icon-box"><i class="fas fa-phone"></i></a>
            <a id="waBtn" href="#" class="icon-box"><i class="fab fa-whatsapp"></i></a>
            <a id="mailBtn" href="#" class="icon-box"><i class="fas fa-envelope"></i></a>
        </div>

        <div class="btn-list">
            <a href="#" class="btn" id="saveContact"><i class="fas fa-user-plus"></i> Save Contact</a>
            <a href="https://in.linkedin.com/in/abhinibesh-gupta-758596265" target="_blank" class="btn"><i class="fab fa-linkedin"></i> LinkedIn</a>
            <a href="https://instagram.com/abhinibeshgupta/" target="_blank" class="btn"><i class="fab fa-instagram"></i> Instagram</a>
            <a href="https://gogenixwebb.xyz" target="_blank" class="btn"><i class="fas fa-globe"></i> Website</a>
            <div id="aptBtn" class="btn apt-btn"><i class="fas fa-calendar-check"></i> APPOINTMENT</div>
        </div>
    </div>

    <div class="todo-panel">
        <div class="calendar-header">
            <div class="calendar-nav">
                <button class="nav-btn" id="prevMonth"><i class="fas fa-chevron-left"></i></button>
                <h2 id="monthDisplay">MONTH YEAR</h2>
                <button class="nav-btn" id="nextMonth"><i class="fas fa-chevron-right"></i></button>
            </div>
            <button class="add-task-btn" onclick="openTodoModal()"><i class="fas fa-plus"></i></button>
        </div>
        <div id="eventContainer"></div>
    </div>

    <footer>NATNEX • SMARD</footer>
</div>

<div id="todoModal" class="modal-overlay">
    <div class="modal-content">
        <h3>New Personal Task</h3>
        <input type="text" id="todoTitle" placeholder="Task Name">
        <input type="date" id="todoDate">
        <input type="time" id="todoTime">
        <div class="modal-actions">
            <button class="cancel-btn" onclick="closeTodoModal()">Cancel</button>
            <button class="save-btn" onclick="saveNewTodo()">Save</button>
        </div>
    </div>
</div>

<div id="aptModal" class="modal-overlay">
    <div class="modal-content">
        <h3>Book Appointment</h3>
        <input type="text" id="aptName" placeholder="Your Full Name">
        <input type="text" id="aptTitle" placeholder="Meeting Title">
        <div style="display:flex; gap:10px;">
            <input type="date" id="aptDate">
            <input type="time" id="aptTime">
        </div>
        <textarea id="aptDesc" rows="3" placeholder="Description/Purpose of meeting"></textarea>
        <div class="modal-actions">
            <button class="cancel-btn" onclick="closeAptModal()">Cancel</button>
            <button class="save-btn" onclick="sendAptEmail()">Send Request (OK)</button>
        </div>
    </div>
</div>

<script src="config.js"></script>
</body>
</html>
