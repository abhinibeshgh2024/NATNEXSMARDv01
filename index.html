<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMARD | Abhinibesh Gupta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-blue: #4285f4; --neon-red: #ea4335; --neon-yellow: #fbbc05; --neon-green: #34a853;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
        }

        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }

        body {
            margin: 0; background: radial-gradient(circle at center, #111 0%, #000 100%);
            color: #fff; font-family: 'Inter', sans-serif; display: flex;
            flex-direction: column; align-items: center; min-height: 100vh; padding: 20px 0;
            scroll-behavior: smooth;
        }

        .card-container { width: 95%; max-width: 420px; text-align: center; }

        /* Profile Card */
        .profile-card {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 30px;
            padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.8); margin-bottom: 25px;
        }

        .avatar {
            width: 110px; height: 110px; border-radius: 50%;
            border: 3px solid var(--neon-blue); margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(66, 133, 244, 0.4);
        }

        h1 { font-size: 1.6rem; margin: 0 0 5px; }
        .tagline { font-size: 0.85rem; color: #aaa; margin-bottom: 25px; }

        /* Action Grid (Phone, WA, Mail) */
        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .icon-box {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            padding: 18px; border-radius: 20px; color: #fff; text-decoration: none;
            transition: 0.3s; font-size: 1.3rem;
        }
        .icon-box:hover { transform: translateY(-5px); background: rgba(255,255,255,0.1); box-shadow: 0 5px 15px rgba(255,255,255,0.1); }

        /* Button List */
        .btn-list { display: flex; flex-direction: column; gap: 12px; }
        .btn {
            background: var(--glass); border: 1px solid var(--border);
            padding: 16px; border-radius: 18px; color: white;
            text-decoration: none; display: flex; align-items: center; gap: 15px;
            font-weight: 600; transition: 0.3s; cursor: pointer;
        }
        .btn:hover { background: rgba(255,255,255,0.12); transform: translateX(5px); }
        .btn-blue { border-left: 4px solid var(--neon-blue); }
        .btn-red { border-left: 4px solid var(--neon-red); }
        .btn-yellow { border-left: 4px solid var(--neon-yellow); }
        
        .apt-btn { 
            background: linear-gradient(90deg, var(--neon-blue), #1a73e8); 
            border: none; justify-content: center; box-shadow: 0 4px 15px rgba(66, 133, 244, 0.3);
        }

        /* Calendar Hover Glow */
        .saka-panel {
            background: var(--glass); border-radius: 30px; padding: 20px;
            margin-top: 10px; border: 1px solid var(--border); width: 100%;
        }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 15px; }
        .day-cell {
            background: rgba(255,255,255,0.03); border-radius: 12px; padding: 10px 0;
            min-height: 65px; cursor: pointer; transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        .day-cell:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(66, 133, 244, 0.4);
            background: rgba(66, 133, 244, 0.1);
            transform: scale(1.05);
        }
        .day-cell.active { border-color: var(--neon-green); background: rgba(52, 168, 83, 0.15); }

        /* Planner Hover Glow */
        .planner-box {
            background: #000; border: 1px solid var(--border); border-radius: 25px;
            margin-top: 20px; padding: 25px; display: none; text-align: left;
            border-top: 4px solid var(--neon-blue);
        }
        .event-card {
            background: rgba(255,255,255,0.04); padding: 15px; border-radius: 15px;
            margin-bottom: 10px; border-left: 4px solid var(--neon-green);
            transition: 0.3s; cursor: default;
        }
        .event-card:hover {
            box-shadow: 0 0 15px rgba(52, 168, 83, 0.3);
            background: rgba(255,255,255,0.08);
        }

        /* Modal */
        .modal-overlay {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.9); z-index:2000; justify-content:center; align-items:center;
            backdrop-filter: blur(10px);
        }
        .modal-content {
            background: #111; padding: 30px; border-radius: 25px; 
            border: 1px solid var(--border); width: 90%; max-width: 380px;
        }
        .modal-content input, .modal-content textarea {
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px;
            border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: white;
        }
    </style>
</head>
<body>

<div class="card-container">
    <div class="profile-card">
        <img src="abhimage.jpg" alt="Abhinibesh" class="avatar">
        <h1>Abhinibesh Gupta</h1>
        <p class="tagline">Founder & CEO, NatNex Technologies</p>

        <div class="action-grid">
            <a href="tel:+91XXXXXXXXXX" class="icon-box" style="color:var(--neon-green)"><i class="fas fa-phone"></i></a>
            <a href="https://wa.me/91XXXXXXXXXX" class="icon-box" style="color:var(--neon-green)"><i class="fab fa-whatsapp"></i></a>
            <a href="mailto:contact@gogenixwebb.xyz" class="icon-box" style="color:var(--neon-red)"><i class="fas fa-envelope"></i></a>
        </div>

        <div class="btn-list">
            <a href="#" class="btn btn-blue"><i class="fas fa-user-plus"></i> Save Contact</a>
            <a href="https://in.linkedin.com/in/abhinibesh-gupta-758596265" target="_blank" class="btn btn-blue"><i class="fab fa-linkedin"></i> LinkedIn</a>
            <a href="https://instagram.com/abhinibeshgupta/" target="_blank" class="btn btn-red"><i class="fab fa-instagram"></i> Instagram</a>
            <a href="https://gogenixwebb.xyz" target="_blank" class="btn btn-yellow"><i class="fas fa-globe"></i> Website</a>
            <div class="btn apt-btn" onclick="openAptModal()"><i class="fas fa-calendar-check"></i> BOOK APPOINTMENT</div>
        </div>
    </div>

    <div class="saka-panel">
        <div style="display:flex; justify-content: space-between; align-items:center;">
            <button onclick="navMonth(-1)" style="background:none; border:none; color:white; cursor:pointer; font-size:1.2rem;">❮</button>
            <h2 id="mTitle" style="color:var(--neon-yellow); font-size: 1.1rem; margin:0; letter-spacing:2px;">CHAITRA</h2>
            <button onclick="navMonth(1)" style="background:none; border:none; color:white; cursor:pointer; font-size:1.2rem;">❯</button>
        </div>
        <div class="calendar-grid" id="calGrid"></div>
    </div>

    <div class="planner-box" id="planner">
        <h3 id="pSakaDate" style="color:var(--neon-yellow); margin:0 0 15px 0;">Date</h3>
        <div style="display:flex; gap:8px; margin-bottom:20px;">
            <input type="text" id="taskInput" placeholder="Add private note..." style="flex:1; background:#111; border:1px solid #333; color:white; padding:12px; border-radius:12px;">
            <button onclick="saveEvent()" style="background:var(--neon-green); border:none; padding:0 15px; border-radius:12px; font-weight:bold; cursor:pointer; color:#000;">ADD</button>
        </div>
        <div id="taskList"></div>
    </div>

    <footer style="margin-top:40px; color:#333; font-size:0.7rem; letter-spacing:4px; padding-bottom:30px;">NATNEX • SMARD</footer>
</div>

<div id="aptModal" class="modal-overlay">
    <div class="modal-content">
        <h3>Book Appointment</h3>
        <input type="text" id="aptName" placeholder="Your Name">
        <input type="text" id="aptTitle" placeholder="Meeting Title">
        <div style="display:flex; gap:8px;">
            <input type="date" id="aptDate">
            <input type="time" id="aptTime">
        </div>
        <textarea id="aptDesc" rows="3" placeholder="Purpose of meeting..."></textarea>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button style="flex:1; background:#333; color:white; border:none; padding:12px; border-radius:12px; cursor:pointer;" onclick="closeAptModal()">Cancel</button>
            <button style="flex:1; background:var(--neon-blue); color:white; border:none; padding:12px; border-radius:12px; font-weight:bold; cursor:pointer;" onclick="sendAptEmail()">Send</button>
        </div>
    </div>
</div>

<script>
    function openAptModal() { document.getElementById('aptModal').style.display = 'flex'; }
    function closeAptModal() { document.getElementById('aptModal').style.display = 'none'; }
    function sendAptEmail() {
        const n = document.getElementById('aptName').value;
        const t = document.getElementById('aptTitle').value;
        const d = document.getElementById('aptDate').value;
        const b = `Meeting: ${t}%0ADate: ${d}%0AFrom: ${n}`;
        window.location.href = `mailto:contact@gogenixwebb.xyz?subject=Appointment Request&body=${b}`;
        closeAptModal();
    }

    let sIdx = 0; let sYear = 2026; let selectedId = null;
    const months = [
        { name: "Chaitra", days: 30, gStart: "03-22" }, { name: "Vaishakha", days: 31, gStart: "04-21" },
        { name: "Jyeshtha", days: 31, gStart: "05-22" }, { name: "Ashadha", days: 31, gStart: "06-22" },
        { name: "Shravana", days: 31, gStart: "07-23" }, { name: "Bhadrapada", days: 31, gStart: "08-23" },
        { name: "Ashwina", days: 30, gStart: "09-23" }, { name: "Kartika", days: 30, gStart: "10-23" },
        { name: "Agrahayana", days: 30, gStart: "11-22" }, { name: "Pausha", days: 30, gStart: "12-22" },
        { name: "Magha", days: 30, gStart: "01-21" }, { name: "Phalguna", days: 30, gStart: "02-20" }
    ];
    let myTasks = JSON.parse(localStorage.getItem('smard_tasks')) || {};

    function render() {
        const grid = document.getElementById('calGrid');
        const m = months[sIdx];
        document.getElementById('mTitle').innerText = m.name.toUpperCase();
        grid.innerHTML = '';
        const startG = new Date(sYear, parseInt(m.gStart.split('-')[0])-1, parseInt(m.gStart.split('-')[1]));
        for(let i=0; i<startG.getDay(); i++) grid.appendChild(document.createElement('div'));

        for(let d=1; d<=m.days; d++) {
            const gDate = new Date(startG); gDate.setDate(gDate.getDate() + (d-1));
            const id = `${sYear}-${sIdx}-${d}`;
            const cell = document.createElement('div');
            cell.className = `day-cell ${selectedId === id ? 'active' : ''}`;
            cell.innerHTML = `<div style="font-size:1.3rem; font-weight:900;">${d}</div><div style="font-size:0.6rem; color:#666;">${gDate.getDate()} ${gDate.toLocaleString('default',{month:'short'})}</div>`;
            cell.onclick = () => {
                selectedId = id;
                document.getElementById('planner').style.display = 'block';
                document.getElementById('pSakaDate').innerText = `${m.name} ${d}`;
                render(); loadTasks();
                document.getElementById('planner').scrollIntoView({ behavior: 'smooth' });
            };
            grid.appendChild(cell);
        }
    }

    function saveEvent() {
        const val = document.getElementById('taskInput').value.trim();
        if(!val) return;
        if(!myTasks[selectedId]) myTasks[selectedId] = [];
        myTasks[selectedId].push(val);
        localStorage.setItem('smard_tasks', JSON.stringify(myTasks));
        document.getElementById('taskInput').value = '';
        loadTasks();
    }

    function loadTasks() {
        const list = document.getElementById('taskList');
        list.innerHTML = '';
        if(selectedId && selectedId.endsWith('-0-1')) {
            list.innerHTML += `<div class="event-card" style="border-left-color:var(--neon-red)">🚩 Happy Birthday Abhinibesh!</div>`;
        }
        (myTasks[selectedId] || []).forEach(t => {
            list.innerHTML += `<div class="event-card">${t}</div>`;
        });
    }

    function navMonth(dir) { sIdx += dir; if(sIdx > 11) { sIdx = 0; sYear++; } if(sIdx < 0) { sIdx = 11; sYear--; } render(); }
    render();
</script>
</body>
</html>
