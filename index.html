<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMARD | Abhinibesh Gupta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --border-white: rgba(255, 255, 255, 0.15);
            --whatsapp: #25D366; --linkedin: #0077b5; --instagram: #E1306C;
            --website: #00d2ff; --phone: #4CAF50; --mail: #EA4335;
        }

        /* Prevent blue highlight on tap and standard resets */
        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }

        body {
            margin: 0; background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%);
            color: #fff; font-family: 'Inter', sans-serif; display: flex;
            justify-content: center; min-height: 100vh; padding: 20px 0;
        }

        .card-container { width: 95%; max-width: 400px; text-align: center; }

        /* Profile Panel */
        .profile-card {
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--border-white); border-radius: 30px;
            padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); margin-bottom: 20px;
        }

        .avatar {
            width: 110px; height: 110px; border-radius: 50%;
            border: 3px solid var(--neon-blue); margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }

        h1 { font-size: 1.6rem; margin: 0 0 5px; }
        .tagline { font-size: 0.85rem; color: #888; margin-bottom: 25px; }

        /* Icon Grid */
        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .icon-box {
            background: var(--glass-bg); border: 1px solid var(--border-white);
            padding: 18px; border-radius: 20px; color: #fff; text-decoration: none;
            transition: all 0.4s ease; font-size: 1.3rem;
        }
        .icon-box:hover { background: rgba(255,255,255,0.12); transform: translateY(-3px); }
        #phoneBtn:hover i { color: var(--phone); text-shadow: 0 0 10px var(--phone); }
        #waBtn:hover i { color: var(--whatsapp); text-shadow: 0 0 10px var(--whatsapp); }
        #mailBtn:hover i { color: var(--mail); text-shadow: 0 0 10px var(--mail); }

        /* List Buttons */
        .btn-list { display: flex; flex-direction: column; gap: 12px; }
        .btn {
            background: var(--glass-bg); border: 1px solid var(--border-white);
            padding: 16px; border-radius: 18px; color: white;
            text-decoration: none; display: flex; align-items: center; gap: 15px;
            font-weight: 500; transition: all 0.3s ease;
        }
        .btn i { width: 25px; font-size: 1.2rem; transition: 0.3s; }
        .btn:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .btn:hover#saveContact i { color: var(--neon-blue); }
        .btn:hover[href*="linkedin"] i { color: var(--linkedin); }
        .btn:hover[href*="instagram"] i { color: var(--instagram); }
        .btn:hover[href*="gogenix"] i { color: var(--website); }

        .pay-btn { background: linear-gradient(90deg, #6a11cb 0%, #2575fc 100%); border: none !important; justify-content: center; }
        footer { margin-top: 30px; font-size: 0.7rem; color: #444; letter-spacing: 4px; }
    </style>
</head>
<body>

<div class="card-container">
    <div class="profile-card">
        <img src="abhimage.jpg" alt="Abhinibesh" class="avatar">
        <h1>Abhinibesh Gupta</h1>
        <p class="tagline">Founder & CEO, NatNex Technologies</p>

        <div class="action-grid">
            <a id="phoneBtn" href="#" class="icon-box"><i class="fas fa-phone"></i></a>
            <a id="waBtn" href="#" class="icon-box"><i class="fab fa-whatsapp"></i></a>
            <a id="mailBtn" href="#" class="icon-box"><i class="fas fa-envelope"></i></a>
        </div>

        <div class="btn-list">
            <a href="#" class="btn" id="saveContact"><i class="fas fa-user-plus"></i> Save Contact</a>
            <a href="https://in.linkedin.com/in/abhinibesh-gupta-758596265" target="_blank" class="btn"><i class="fab fa-linkedin"></i> LinkedIn</a>
            <a href="https://instagram.com/abhinibeshgupta/" target="_blank" class="btn"><i class="fab fa-instagram"></i> Instagram</a>
            <a href="https://gogenixwebb.xyz" target="_blank" class="btn"><i class="fas fa-globe"></i> Website</a>
            <a id="upiBtn" href="javascript:void(0)" class="btn pay-btn"><i class="fas fa-bolt"></i> Pay via UPI</a>
        </div>
    </div>

    <footer>NATNEX • SMARD</footer>
</div>
<script src="config.js"></script>
</body>
</html>
